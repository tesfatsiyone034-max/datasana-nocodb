services:
  - type: web
    name: datasana-grades
    runtime: image
    repo: https://github.com/YOUR_USERNAME/datasana-nocodb
    plan: free
    envVars:
      - key: NC_DB
        fromDatabase:
          name: datasana-db
          property: connectionString
      - key: NC_PUBLIC_URL
        value: https://datasana-grades.onrender.com
      - key: PORT
        value: 8080
      - key: NODE_ENV
        value: production

databases:
  - name: datasana-db
    plan: free
    databaseName: nocodb
    user: nocodb